<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="9" fill="url(#bg)"/>
  <rect width="32" height="32" rx="9" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- L mark -->
  <rect x="8.5" y="7.5" width="5" height="17" rx="2.5" fill="white"/>
  <rect x="8.5" y="19.5" width="15" height="5" rx="2.5" fill="white"/>
  <!-- Accent node -->
  <circle cx="22.5" cy="9.5" r="3" fill="url(#dot)"/>
  <circle cx="22.5" cy="9.5" r="1.4" fill="white" opacity="0.9"/>
  <!-- Connector -->
  <line x1="13.5" y1="12" x2="20" y2="10.5" stroke="rgba(255,255,255,0.22)" stroke-width="1" stroke-linecap="round"/>
</svg>
